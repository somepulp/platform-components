# Zot Helm values
# Reference: https://zotregistry.dev/v2.1.11/admin-guide/admin-getting-started/
# Reference: https://github.com/project-zot/helm-charts

# Mount the VSO-synced htpasswd secret (zot-secret) at /secret 
mountConfig: true
mountSecret: true 

configFiles:
  config.json: |
    {
      "storage": {
        "rootDirectory": "/var/lib/registry"
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000",
        "auth": {
          "htpasswd": {
            "path": "/secret/htpasswd"
          }
        }
      },
      "log": {
        "level": "info"
      },
      "extensions": {
        "search": {
          "enable": true
        },
        "ui": {
          "enable": true
        }
      }
    }

# HTTPRoute via Envoy Gateway 
httproute:
  enabled: true
  hostnames: 
    - zot.platform
  parentRefs:
    - name: platform-gateway
      namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
      sectionName: https

# Persistence using k3s local-path-provisioner
persistence: true
pvc:
  storage: 10Gi

service:
  type: ClusterIP
  port: 5000