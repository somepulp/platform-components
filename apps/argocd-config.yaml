apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: 
  name: argocd-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1" 
spec: 
  project: default
  source:
    repoURL: git@github.com:somepulp/platform-components
    targetRevision: HEAD
    path: services/argocd
  destination: 
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true